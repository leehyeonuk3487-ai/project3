services:
  - type: web
    name: military-insurance-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/meta
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
