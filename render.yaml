services:
  - type: web
    name: military-insurance-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/meta
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # 무거운 분석 엔드포인트는 정적 스냅샷(dashboard/snapshot.json)으로 서빙되어
      # 512MB 무료 티어에서 OOM/타임아웃 없이 즉시 응답한다. 스냅샷은 커밋되어 있고
      # 파일 존재만으로 자동 활성화(별도 env 불필요). 갱신: python -m scripts.build_snapshot
